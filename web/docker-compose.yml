# Local development with hot-reload
# Usage: from Data-Processing-GUI-main/ run:
#   docker compose -f web/docker-compose.yml up

services:
  backend:
    build:
      context: ..          # project root
      dockerfile: web/Dockerfile
      target: python:3.11-slim   # skip frontend stage for dev
    image: spectroscopy-backend
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
    volumes:
      # Hot-reload: mount source directories
      - ../core:/app/core
      - ../db:/app/db
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_BASE: http://localhost:8000
